services:
  lukia-db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lukia-net
  lukia-web:
    build: 
      context: ./app
      dockerfile: Dockerfile
    container_name: lukia-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@lukia-db:5432/${POSTGRES_DB}
      APP_URL: ${APP_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      lukia-db:
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - lukia-net


networks:
  lukia-net:
    driver: bridge

